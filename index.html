<!-- 🌐 LANGUAGE SCRIPT -->
<script>
let isEnglish = true;

function toggleLanguage() {
    const elements = document.querySelectorAll("[data-en]");
    isEnglish = !isEnglish;

    elements.forEach(el => {
        el.innerText = isEnglish ? el.getAttribute("data-en") : el.getAttribute("data-gu");
    });

    document.getElementById("langBtn").innerText = isEnglish ? "ગુજરાતી" : "English";
}
</script>
